<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <defs>
    <!-- Top violet/purple gradient -->
    <linearGradient id="violet-grad" x1="26" y1="12" x2="58" y2="27" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4A15FF" />
      <stop offset="100%" stop-color="#B625FF" />
    </linearGradient>

    <!-- Middle pink gradient -->
    <linearGradient id="pink-grad" x1="27" y1="29" x2="50" y2="39" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF2A7A" />
      <stop offset="100%" stop-color="#9E1FFF" />
    </linearGradient>

    <!-- Bottom cyan/blue gradient -->
    <linearGradient id="blue-grad" x1="20" y1="50" x2="35" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#0066FF" />
    </linearGradient>

    <!-- O-ring gradient -->
    <linearGradient id="o-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2A7A" />
      <stop offset="100%" stop-color="#00F0FF" />
    </linearGradient>
  </defs>

  <g transform="translate(10, 5)">
    <!-- Top Purple/Violet Ribbon of F -->
    <path
      d="M 26,40 C 26,21 35,12 55,12 C 59,12 59,21 55,21 C 38,21 34,29 34,40 Z"
      fill="url(#violet-grad)"
    />

    <!-- Middle Pink Ribbon of F -->
    <path
      d="M 27,47 C 27,34 32,29 48,29 C 52,29 52,39 48,39 C 35,39 34,43 34,47 Z"
      fill="url(#pink-grad)"
    />

    <!-- Bottom Blue Stem of F -->
    <path
      d="M 34,36 C 34,50 30,63 20,63 C 16,63 16,53 20,53 C 26,53 26,46 26,36 Z"
      fill="url(#blue-grad)"
      transform="translate(0, -6)"
    />
  </g>

  <!-- Text "Figvo" -->
  <text x="76" y="36" font-family="Space Grotesk, sans-serif" font-size="28" font-weight="bold" fill="#f0f0f5">
    Figv
  </text>
  
  <!-- The O gradient circle ring -->
  <circle cx="158" cy="27.5" r="9.5" stroke="url(#o-grad)" stroke-width="5.5" />

  <!-- Slogan "BUILD • INNOVATE • GROW" -->
  <text x="76" y="50" font-family="Inter, sans-serif" font-size="7.5" font-weight="bold" letter-spacing="1.5" fill="#8888a0">
    BUILD
  </text>
  <circle cx="112" cy="47.5" r="1.5" fill="#FF2A7A" />
  <text x="119" y="50" font-family="Inter, sans-serif" font-size="7.5" font-weight="bold" letter-spacing="1.5" fill="#8888a0">
    INNOVATE
  </text>
  <circle cx="168" cy="47.5" r="1.5" fill="#00F0FF" />
  <text x="175" y="50" font-family="Inter, sans-serif" font-size="7.5" font-weight="bold" letter-spacing="1.5" fill="#8888a0">
    GROW
  </text>
</svg>
